<!-- Static form skeleton for Netlify Forms build-time detection -->
<html>
  <body>
    <form name="quote" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="quote" />
      <input type="hidden" name="subject" value="New Quote Request from RadiantAV" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
      <input name="phone" />
      <input name="date" />
      <input name="eventType" />
      <input name="venue" />
      <input name="services" />
      <input name="message" />
    </form>
  </body>
</html>
